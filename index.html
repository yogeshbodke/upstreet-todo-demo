<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Nokia Snake</title>
<style>
  :root {
    --lcd: #9ead86;      /* classic olive-green LCD */
    --lcd-dark: #8a9a72;
    --ink: #2b3016;      /* dark pixel color */
    --body: #2f3336;
    --body-2: #1c1f21;
    --accent: #c9d1b8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(circle at 50% 20%, #3a3f42, #101214 70%);
    font-family: "Courier New", monospace;
    display: flex; align-items: center; justify-content: center;
    user-select: none; overflow: hidden;
  }

  /* ---- Phone body ---- */
  .phone {
    width: 300px;
    background: linear-gradient(180deg, #3c4144, #23282b);
    border-radius: 34px 34px 40px 40px;
    padding: 22px 20px 26px;
    box-shadow: 0 20px 50px rgba(0,0,0,.6),
                inset 0 2px 2px rgba(255,255,255,.15),
                inset 0 -3px 6px rgba(0,0,0,.5);
    border: 2px solid #14171a;
  }
  .brand {
    text-align: center; color: #cdd3d6; letter-spacing: 3px;
    font-size: 13px; font-weight: bold; margin: 2px 0 12px;
    text-shadow: 0 1px 0 #000;
  }
  .earpiece {
    width: 46px; height: 6px; background: #14171a; border-radius: 4px;
    margin: -4px auto 12px; box-shadow: inset 0 1px 2px #000;
  }

  /* ---- Screen ---- */
  .screen-bezel {
    background: #14171a; border-radius: 10px; padding: 10px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,.8);
  }
  .lcd {
    background: var(--lcd);
    border-radius: 4px;
    padding: 6px;
    box-shadow: inset 0 0 0 2px var(--lcd-dark), inset 0 0 14px rgba(0,0,0,.25);
  }
  .status {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--ink); font-size: 11px; font-weight: bold;
    padding: 1px 3px 4px;
  }
  canvas {
    display: block; width: 100%; image-rendering: pixelated;
    background: var(--lcd);
    border-top: 2px solid var(--lcd-dark);
  }
  .footer {
    display: flex; justify-content: space-between;
    color: var(--ink); font-size: 11px; font-weight: bold;
    padding: 4px 3px 1px;
  }

  /* ---- Overlay text on screen ---- */
  .overlay {
    position: relative;
  }
  .msg {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    color: var(--ink); font-weight: bold; letter-spacing: 1px;
    background: rgba(158,173,134,.82);
  }
  .msg h1 { font-size: 18px; margin: 0 0 6px; }
  .msg p  { font-size: 12px; margin: 3px 0; line-height: 1.4; }
  .blink { animation: blink 1s steps(2, start) infinite; }
  @keyframes blink { to { visibility: hidden; } }
  .hidden { display: none !important; }

  /* ---- Keypad ---- */
  .keys { margin-top: 18px; }
  .dpad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 40px);
    gap: 6px; width: 150px; margin: 0 auto;
  }
  .btn {
    background: linear-gradient(180deg, #4a4f52, #2a2e30);
    color: #d7dce0; border: 1px solid #14171a; border-radius: 8px;
    font-size: 18px; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 1px 1px rgba(255,255,255,.15), 0 2px 3px rgba(0,0,0,.4);
    transition: transform .05s, background .1s;
  }
  .btn:active { transform: translateY(1px); background: linear-gradient(180deg,#3a3f42,#202426); }
  .center { background: linear-gradient(180deg,#5a6064,#34383b); border-radius: 50%; font-size: 10px; }
  .empty { visibility: hidden; }
  .hint {
    text-align: center; color: #7d8488; font-size: 11px; margin-top: 14px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="earpiece"></div>
    <div class="brand">NOKIA</div>

    <div class="screen-bezel">
      <div class="lcd">
        <div class="status">
          <span>SNAKE II</span>
          <span id="hi">Hi 0</span>
        </div>
        <div class="overlay">
          <canvas id="game" width="132" height="132"></canvas>
          <div class="msg" id="msg">
            <h1>SNAKE</h1>
            <p>Eat the dots.</p>
            <p>Don't hit the walls</p>
            <p>or yourself.</p>
            <p class="blink">▶ PRESS START ◀</p>
          </div>
        </div>
        <div class="footer">
          <span id="scoreLbl">Score 0</span>
          <span id="lvlLbl">Lv 1</span>
        </div>
      </div>
    </div>

    <div class="keys">
      <div class="dpad">
        <div class="btn empty"></div>
        <div class="btn" data-dir="up">▲</div>
        <div class="btn empty"></div>
        <div class="btn" data-dir="left">◀</div>
        <div class="btn center" id="startBtn">START</div>
        <div class="btn" data-dir="right">▶</div>
        <div class="btn empty"></div>
        <div class="btn" data-dir="down">▼</div>
        <div class="btn empty"></div>
      </div>
      <div class="hint">Arrow keys / D-pad &nbsp;·&nbsp; Space = pause</div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Grid setup — 22x22 cells on a 132px canvas => 6px cells
  const CELL = 6;
  const COLS = canvas.width / CELL;   // 22
  const ROWS = canvas.height / CELL;  // 22
  const INK = getComputedStyle(document.documentElement).getPropertyValue('--ink').trim();
  const LCD = getComputedStyle(document.documentElement).getPropertyValue('--lcd').trim();

  const msgEl = document.getElementById('msg');
  const scoreLbl = document.getElementById('scoreLbl');
  const hiLbl = document.getElementById('hi');
  const lvlLbl = document.getElementById('lvlLbl');

  let snake, dir, nextDir, food, score, level, running, paused, dead, timer, tickMs;
  let hi = Number(localStorage.getItem('snakeHi') || 0);
  hiLbl.textContent = 'Hi ' + hi;

  function reset() {
    snake = [{x: 6, y: 11}, {x: 5, y: 11}, {x: 4, y: 11}];
    dir = {x: 1, y: 0};
    nextDir = dir;
    score = 0;
    level = 1;
    tickMs = 140;
    dead = false;
    paused = false;
    placeFood();
    updateLabels();
  }

  function placeFood() {
    while (true) {
      const f = { x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0 };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function updateLabels() {
    scoreLbl.textContent = 'Score ' + score;
    lvlLbl.textContent = 'Lv ' + level;
  }

  // Draw a pixel-art rounded block like the old LCD segments
  function block(x, y, hollow) {
    const px = x * CELL, py = y * CELL, p = 1;
    ctx.fillStyle = INK;
    ctx.fillRect(px + p, py + p, CELL - 2 * p, CELL - 2 * p);
    if (hollow) {
      ctx.fillStyle = LCD;
      ctx.fillRect(px + 2, py + 2, CELL - 4, CELL - 4);
    }
  }

  function draw() {
    ctx.fillStyle = LCD;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // food as a hollow blinking block
    block(food.x, food.y, ((Date.now() / 250) | 0) % 2 === 0);
    // snake — head solid, body solid
    snake.forEach(s => block(s.x, s.y, false));
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision (Snake II with walls)
    if (head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS) return gameOver();
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      if (score > hi) { hi = score; hiLbl.textContent = 'Hi ' + hi; localStorage.setItem('snakeHi', hi); }
      // level up + speed up every 50 pts
      const newLevel = Math.floor(score / 50) + 1;
      if (newLevel !== level) { level = newLevel; tickMs = Math.max(60, 140 - (level - 1) * 12); restartTimer(); }
      updateLabels();
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function restartTimer() {
    clearInterval(timer);
    timer = setInterval(() => { if (running && !paused) step(); }, tickMs);
  }

  function gameOver() {
    dead = true; running = false; paused = false;
    clearInterval(timer);
    draw();
    showMsg(`<h1>GAME OVER</h1>
      <p>Score ${score} &nbsp; Lv ${level}</p>
      <p>Best ${hi}</p>
      <p class="blink">▶ PRESS START ◀</p>`);
  }

  function showMsg(html) { msgEl.innerHTML = html; msgEl.classList.remove('hidden'); }
  function hideMsg() { msgEl.classList.add('hidden'); }

  function start() {
    reset();
    hideMsg();
    running = true;
    draw();
    restartTimer();
  }

  function togglePause() {
    if (!running || dead) return;
    paused = !paused;
    if (paused) showMsg('<h1>PAUSED</h1><p class="blink">Space to resume</p>');
    else hideMsg();
  }

  function setDir(nx, ny) {
    // no 180° reversal
    if (nx === -dir.x && ny === -dir.y) return;
    nextDir = { x: nx, y: ny };
  }

  const DIRS = {
    up:    [0, -1], down:  [0, 1],
    left:  [-1, 0], right: [1, 0],
  };

  // Keyboard
  window.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp': case 'w': setDir(0, -1); e.preventDefault(); break;
      case 'ArrowDown': case 's': setDir(0, 1); e.preventDefault(); break;
      case 'ArrowLeft': case 'a': setDir(-1, 0); e.preventDefault(); break;
      case 'ArrowRight': case 'd': setDir(1, 0); e.preventDefault(); break;
      case ' ': case 'Spacebar':
        if (!running || dead) start(); else togglePause();
        e.preventDefault();
        break;
      case 'Enter':
        if (!running || dead) start();
        break;
    }
  });

  // On-screen d-pad
  document.querySelectorAll('.btn[data-dir]').forEach(b => {
    const handler = ev => {
      ev.preventDefault();
      const [x, y] = DIRS[b.dataset.dir];
      setDir(x, y);
    };
    b.addEventListener('click', handler);
    b.addEventListener('touchstart', handler, { passive: false });
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    if (!running || dead) start(); else togglePause();
  });

  // initial render
  reset();
  running = false;
  draw();
})();
</script>
</body>
</html>
